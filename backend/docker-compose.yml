version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      - POSTGRES_HOST_AUTH_METHOD=trust  # ESTA LÍNEA PERMITE ENTRAR SIN CLAVE
      - POSTGRES_DB=appmermas_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://appmermas_user:adminpassword@db:5432/appmermas_db

volumes:
  postgres_data: